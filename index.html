<!doctype html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#c9a227" />
    <link rel="manifest" href="/quran-word-trainer/manifest.webmanifest" />
    <link rel="icon" href="/quran-word-trainer/icon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="/quran-word-trainer/icon-192.png" />
    <title>Quran Word Trainer</title>
    <script>
      (function () {
        var t;
        try { t = localStorage.getItem("qwt-theme"); } catch (e) {}
        var r = t === "light" || t === "dark" ? t
          : window.matchMedia("(prefers-color-scheme: light)").matches ? "light" : "dark";
        document.documentElement.setAttribute("data-theme", r);
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
